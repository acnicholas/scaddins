name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 26.3.2) — without leading v'
        required: true

jobs:
  release:
    name: Build, package, publish
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = "${{ github.ref_name }}".TrimStart('v')
          }
          if ($v -notmatch '^\d+\.\d+\.\d+$') { throw "Bad version '$v'" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $v"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build all configs
        shell: pwsh
        run: scripts\build.ps1 -Clean

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package installer
        shell: pwsh
        run: scripts\build-installer.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: setup/out/nullCarbon-LCA-Export-win64-${{ steps.ver.outputs.version }}.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: nullCarbon Revit Export ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            setup/out/nullCarbon-LCA-Export-win64-${{ steps.ver.outputs.version }}.exe
